<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quest Registration</title>
    <link rel="stylesheet" href="register.css" />
  </head>

  <body>
    <header>
      <a href="index.html" class="logo">QuestDrive</a>
    </header>

    <main class="register-page">
      <h1>Register for the Quest</h1>

      <form id="registerForm">
        <label>
          Full Name
          <input type="text" id="name" required />
        </label>

        <label>
          Team Name
          <input type="text" id="team" required />
        </label>

        <label>
          Email
          <input type="email" id="email" required />
        </label>

        <label>
          Phone Number
          <input type="tel" id="phone" required />
        </label>

        <label>
          Car Number
          <input type="text" id="car" required />
        </label>

        <button type="submit" class="btn">Pay for the Game</button>
      </form>
    </main>

    <script src="/js/register.js"></script>
  </body>
</html>
